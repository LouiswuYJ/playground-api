version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: playground_api_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/playground_api_development
      RAILS_ENV: development
    depends_on:
      - db
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    command: ./bin/rails server -b 0.0.0.0

volumes:
  postgres_data:
  bundle_cache: